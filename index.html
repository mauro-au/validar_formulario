<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>Desafío I - Formulario de Validación</title>

  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <main class="content">
    <section class="content_left">
      <figure class="avatar">
        <img src="https://i.pravatar.cc/120" alt="">
      </figure>

      <form action="/" method="POST">

        <fieldset>
          <label for="name">Nombre completo</label>
          <input type="text" id="name" name="name" placeholder="Juan Jimenez" maxlength="100"
            title="Ingrese tu nombre completo" required autofocus />

          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="ejemplo@ejemplo.com" maxlength="100"
            title="Ingrese tu correo electrónico" required />

          <label for="phone">Teléfono</label>
          <input type="tel" id="phone" name="tel" placeholder="+56 9 911111111" maxlength="15" pattern="[0-9]{9,15}"
            title="Ingrese tu numero telefónico " required />

          <label for="userName">Nombre de usuario</label>
          <input type="text" id="userName" name="userName" placeholder="juancho" maxlength="20"
            title="Ingrese su nombre de usuario" required />

          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="*********"
            title="Ingrese una contraseña segura" required />

          <div class="checbox">
            <input type="checkbox">
            <span>Acepta los <a href="#">términos servicios</a> y condiciones</span>
          </div>
          <button type="submit">Registrar</button>
        </fieldset>
        <p class="login">¿Ya tienes una cuenta? <a href="#">Ingresa</a></p>
      </form>
    </section>
    <section class="content_right">
      <div class="content_rigth-image">
        <!-- <h1>Formulario de registro</h1> -->
      </div>
    </section>
  </main>

  <script type="text/javascript" src="assets/js/script.js"></script>
</body>

</html>
