<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Desafío I - Formulario de Validación</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="content">
        <div class="content_left">
            <form action="/" method="POST">
                <h1>Formulario de registro</h1>
                <fieldset>
                    <label for="name">Nombre</label>
                    <input type="text" id="name" placeholder="Juan Juan">

                    <label for="lastName">Apellidos</label>
                    <input type="text" id="lastName" placeholder="Acevedo Acevedo">

                    <label for="email">email</label>
                    <input type="email" id="email" placeholder="ejemplo@ejemplo.com">

                    <label for="userName">Nombre de usuario</label>
                    <input type="email" id="userName" placeholder="juancho">

                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="*********">

                    <label for="phone">Teléfono</label>
                    <input type="tel" id="phone" placeholder="+56 9 911111111">

                    <button type="submit">Registrar</button>
                </fieldset>
            </form>
        </div>
        <div class="content_rigth"></div>
    </div>

    <script type="text/javascript" src="script.js"></script>
</body>

</html>
